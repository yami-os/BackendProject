<div class="container mt-4">
  <h2 class="text-primary mb-4">Panel de Administradores</h2>

  <div class="card shadow-sm p-4 mb-4">
    <div class="row g-3">
      <div class="col-md-2">
        <label class="form-label">ID</label>
        <input type="number" class="form-control" [(ngModel)]="admin.adm_Id" [disabled]="editando">
      </div>
      <div class="col-md-4">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-control" [(ngModel)]="admin.adm_Nombre" placeholder="Ej. Alejandro Lopez">
      </div>
      <div class="col-md-3">
        <label class="form-label">Correo</label>
        <input type="email" class="form-control" [(ngModel)]="admin.adm_Correo" placeholder="correo@ejemplo.com">
      </div>
      <div class="col-md-3">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-control" [(ngModel)]="admin.adm_Contra">
      </div>
      <div class="col-12 text-end">
        <button class="btn btn-secondary me-2" (click)="limpiar()">Cancelar</button>
        <button class="btn btn-success" (click)="guardar()">
          {{ editando ? 'Actualizar Datos' : 'Registrar Administrador' }}
        </button>
      </div>
    </div>
  </div>

  <div class="table-responsive shadow-sm">
    <table class="table table-hover table-bordered align-middle">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Nombre Completo</th>
          <th>Correo Electrónico</th>
          <th class="text-center">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let a of admins">
          <td>{{ a.adm_Id }}</td>
          <td>{{ a.adm_Nombre }}</td>
          <td>{{ a.adm_Correo }}</td>
          <td class="text-center">
            <button class="btn btn-warning btn-sm me-2" (click)="editar(a)">Editar</button>
            <button class="btn btn-danger btn-sm" (click)="eliminar(a.adm_Id)">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
